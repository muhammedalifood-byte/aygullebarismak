<!DOCTYPE html>
<html lang="az">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aygül üçün 💙</title>
    <style>
        body {
            margin: 0;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Segoe UI', sans-serif;
            background: linear-gradient(45deg, #1e3c72, #2a5298, #7b1fa2, #ff758c);
            background-size: 400% 400%;
            animation: gradientBG 15s ease infinite;
            overflow: hidden;
            color: white;
        }

        @keyframes gradientBG {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        .glass-card {
            background: rgba(255, 255, 255, 0.1);
            padding: 40px;
            border-radius: 30px;
            backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            box-shadow: 0 15px 35px rgba(0,0,0,0.4);
            text-align: center;
            width: 400px;
            min-height: 450px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            z-index: 10;
        }

        h1 { font-size: 2.5em; margin-bottom: 20px; text-shadow: 2px 2px 5px rgba(0,0,0,0.3); }
        .hidden { display: none; }

        .btn-main {
            width: 100%;
            padding: 15px;
            margin: 10px 0;
            border: none;
            border-radius: 15px;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s;
            background: #ffcc00;
            color: #333;
        }

        .action-btns { display: flex; gap: 15px; justify-content: center; margin-top: 20px; }
        
        .yes-btn { 
            background: #00ffae; 
            color: #1e3c72; 
            padding: 12px 30px; 
            border-radius: 50px; 
            border: none; 
            cursor: pointer; 
            font-weight: bold;
            font-size: 18px;
        }

        .no-btn { 
            background: #ff4d4d; 
            color: white; 
            padding: 12px 30px; 
            border-radius: 50px; 
            border: none; 
            cursor: pointer; 
            font-weight: bold;
            font-size: 18px;
        }

        /* Pişik Şəkli */
        .cat-container {
            margin: 20px auto;
            width: 200px;
            height: 200px;
            border-radius: 20px;
            overflow: hidden;
            border: 4px solid white;
        }

        .cat-container img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        /* Sevgi Barı */
        .progress-container { width: 100%; background: rgba(255,255,255,0.2); border-radius: 20px; height: 30px; margin: 20px 0; overflow: hidden; }
        .progress-bar { width: 0%; height: 100%; background: #ff4d4d; transition: width 0.4s ease; }
        
        .back-link { margin-top: 25px; color: #ddd; cursor: pointer; text-decoration: underline; font-size: 14px; }

        .rocket { position: absolute; font-size: 40px; animation: flyUp 2s linear forwards; z-index: 5; }
        @keyframes flyUp { from { bottom: -50px; } to { bottom: 110vh; opacity: 0; } }
    </style>
</head>
<body>

    <!-- ANA SƏHİFƏ -->
    <div id="mainPage" class="glass-card">
        <h1>💙 Aygül 💙</h1>
        <button class="btn-main" onclick="openSection('barisPage')">1. Mənimlə barışarsan? 🥺</button>
        <button class="btn-main" onclick="openSection('sevgiPage')">2. Seviyonmu beni? 💖</button>
    </div>

    <!-- BARIŞMA BÖLMƏSİ -->
    <div id="barisPage" class="glass-card hidden">
        <h2 id="barisTitle">Mənimlə barışarsan? 👉👈</h2>
        
        <div id="catArea" class="hidden">
            <div class="cat-container">
                <img src="image_694bde.png" alt="Pişik">
            </div>
            <h3>Helelelelele! 🎉 Barışdıq!</h3>
        </div>

        <div id="barisBtns" class="action-btns">
            <button class="yes-btn" onclick="showSuccess()">Bəli 💖</button>
            <button class="no-btn" onclick="showWarning()">Xeyr 😡</button>
        </div>
        
        <p id="warnMsg" style="color: #ffcc00; margin-top: 15px; font-weight: bold;"></p>
        <span class="back-link" onclick="goHome()">Geri qayıt</span>
    </div>

    <!-- SEVGİ BÖLMƏSİ -->
    <div id="sevgiPage" class="glass-card hidden">
        <h2>Məni nə qədər sevirsən?</h2>
        <div class="progress-container">
            <div id="loveBar" class="progress-bar"></div>
        </div>
        <h3 id="percentText">0%</h3>
        <button class="btn-main" style="background: #ff758c; color: white;" onclick="fillLove()">Çox sevirəm! 😍</button>
        <p id="rocketMsg" style="font-weight: bold;"></p>
        <span class="back-link" onclick="goHome()">Geri qayıt</span>
    </div>

    <script>
        function openSection(id) {
            document.getElementById('mainPage').classList.add('hidden');
            document.getElementById(id).classList.remove('hidden');
        }

        function goHome() {
            document.querySelectorAll('.glass-card').forEach(c => c.classList.add('hidden'));
            document.getElementById('mainPage').classList.remove('hidden');
            // Reset state
            document.getElementById('catArea').classList.add('hidden');
            document.getElementById('barisBtns').classList.remove('hidden');
            document.getElementById('barisTitle').classList.remove('hidden');
            document.getElementById('warnMsg').innerText = "";
        }

        function showWarning() {
            document.getElementById('warnMsg').innerText = "❌ Bu seçim istifadə edilmir! 😄";
        }

        function showSuccess() {
            document.getElementById('barisTitle').classList.add('hidden');
            document.getElementById('barisBtns').classList.add('hidden');
            document.getElementById('warnMsg').innerText = "";
            document.getElementById('catArea').classList.remove('hidden');
        }

        let loveLevel = 0;
        function fillLove() {
            if (loveLevel < 100) {
                loveLevel += 20;
                document.getElementById('loveBar').style.width = loveLevel + '%';
                document.getElementById('percentText').innerText = loveLevel + '%';
            }
            if (loveLevel >= 100) {
                document.getElementById('rocketMsg').innerText = "VƏZİYYƏT KRİTİKDİR! 🚀🚀🚀";
                for(let i=0; i<30; i++) {
                    setTimeout(createRocket, i * 100);
                }
            }
        }

        function createRocket() {
            const r = document.createElement('div');
            r.className = 'rocket';
            r.innerHTML = '🚀';
            r.style.left = Math.random() * 100 + 'vw';
            document.body.appendChild(r);
            setTimeout(() => r.remove(), 2000);
        }
    </script>
</body>
</html>
