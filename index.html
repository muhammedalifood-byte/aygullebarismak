<!DOCTYPE html>
<html lang="az">
<head>
<meta charset="UTF-8">
<title>Aygül 💙</title>

<style>
body {
    margin: 0;
    font-family: Arial;
    text-align: center;
    background: linear-gradient(270deg, #1e3c72, #2a5298, #ff758c);
    background-size: 600% 600%;
    animation: bg 10s ease infinite;
    color: white;
}

@keyframes bg {
    0% {background-position:0% 50%;}
    50% {background-position:100% 50%;}
    100% {background-position:0% 50%;}
}

.container {
    margin-top: 120px;
}

button {
    padding: 15px 30px;
    margin: 10px;
    border: none;
    border-radius: 10px;
    font-size: 18px;
    cursor: pointer;
}

.yes { background: #00ffae; color: black; }
.no { background: #ff4d4d; color: white; }
.main { background: gold; color: black; }

#result {
    margin-top: 20px;
    font-size: 22px;
}

/* progress bar */
.progress-container {
    width: 80%;
    margin: 20px auto;
    background: rgba(255,255,255,0.2);
    border-radius: 20px;
    overflow: hidden;
    display: none;
}

.progress-bar {
    height: 30px;
    width: 0%;
    background: lime;
    text-align: center;
    line-height: 30px;
    color: black;
    font-weight: bold;
}

/* confetti */
.confetti {
    position: fixed;
    width: 10px;
    height: 10px;
    top: -10px;
    animation: fall 3s linear infinite;
}

@keyframes fall {
    to { transform: translateY(100vh); }
}
</style>
</head>

<body>

<div class="container">

    <!-- 1-ci ekran -->
    <div id="first">
        <button class="main" onclick="showOptions()">💙 Barışmak istəyirəm</button>
    </div>

    <!-- 2-ci ekran -->
    <div id="second" style="display:none;">
        <h2>Mənimlə barışarsan? 🥺</h2>
        <button class="yes" onclick="yesClick()">Evet 💖</button>
        <button class="no" onclick="noClick()">Hayır 😡</button>

        <br><br>

        <button class="main" onclick="loveClick()">❤️ Beni seviyonmu?</button>
    </div>

    <!-- progress -->
    <div class="progress-container" id="progressContainer">
        <div class="progress-bar" id="progressBar">0%</div>
    </div>

    <button id="fillBtn" class="yes" style="display:none;" onclick="fillBar()">
        Çox seviyom 💙
    </button>

    <div id="result"></div>

</div>

<script>
let progress = 0;

function showOptions() {
    document.getElementById("first").style.display = "none";
    document.getElementById("second").style.display = "block";
}

function yesClick() {
    document.getElementById("result").innerHTML =
    "💙 Mən Muhammedali, səninlə barışmaq istəyirəm!";
}

function noClick() {
    document.getElementById("result").innerHTML =
    "❌ Bu seçim istifadə edilmir 😄";
}

function loveClick() {
    document.getElementById("progressContainer").style.display = "block";
    document.getElementById("fillBtn").style.display = "inline-block";
}

function fillBar() {
    if (progress < 100) {
        progress += 20;
        document.getElementById("progressBar").style.width = progress + "%";
        document.getElementById("progressBar").innerText = progress + "%";
    }

    if (progress >= 100) {
        launchConfetti();
    }
}

function launchConfetti() {
    for (let i = 0; i < 100; i++) {
        let c = document.createElement("div");
        c.classList.add("confetti");
        c.style.left = Math.random() * 100 + "vw";
        c.style.background = "hsl(" + Math.random()*360 + ",100%,50%)";
        c.style.animationDuration = (Math.random()*3+2) + "s";
        document.body.appendChild(c);
    }

    document.getElementById("result").innerHTML =
    "💖 100% SEVİYORUMMM 💖";
}
</script>

</body>
</html>
