<!DOCTYPE html>
<html lang="az">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aygül üçün Özəl 💙</title>
    <style>
        body {
            margin: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #1e3c72, #2a5298);
            color: white;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
            text-align: center;
        }

        .main-menu, .section, .baris-success {
            background: rgba(255, 255, 255, 0.1);
            padding: 40px;
            border-radius: 30px;
            backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            box-shadow: 0 15px 35px rgba(0,0,0,0.4);
            width: 380px;
            z-index: 10;
        }

        .hidden { display: none; }

        h1 { font-size: 2.2em; margin-bottom: 20px; }
        h2 { font-weight: 300; margin-bottom: 30px; }

        button {
            width: 100%;
            padding: 15px;
            margin: 10px 0;
            border: none;
            border-radius: 15px;
            font-size: 18px;
            cursor: pointer;
            transition: 0.3s;
            font-weight: bold;
        }

        .menu-btn { background: #ffcc00; color: #333; }
        .menu-btn:hover { transform: scale(1.05); }

        .yes-btn { background: #00ffae; color: #1e3c72; }
        .no-btn { background: #ff4d4d; color: white; position: relative; }
        .back-btn { background: rgba(255,255,255,0.3); color: white; font-size: 14px; width: auto; padding: 10px 20px; border-radius: 50px; }

        /* BARIŞMAQ UĞURLU OLANDA */
        .baris-success {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 20px;
        }

        .cat-image-container {
            width: 250px;
            height: 250px;
            border-radius: 50%; /* Dairəvi şəkil */
            overflow: hidden;
            border: 5px solid rgba(255, 255, 255, 0.5);
            box-shadow: 0 0 20px rgba(255, 255, 255, 0.3);
        }

        .cat-image-container img {
            width: 100%;
            height: 100%;
            object-fit: cover; /* Şəklin kəsilmədən sığması */
        }

        /* Sevgi Barı */
        .progress-container { width: 100%; background: #eee; border-radius: 20px; height: 25px; margin: 20px 0; overflow: hidden; }
        .progress-bar { width: 0%; height: 100%; background: linear-gradient(90deg, #ff758c, #ff4d4d); transition: width 0.5s ease; }
        #percentText { font-size: 1.2em; font-weight: bold; color: #ff758c; }

        /* Raket effekti */
        .rocket { position: absolute; font-size: 40px; animation: rocketFly 2s linear forwards; }
        @keyframes rocketFly {
            from { bottom: -50px; left: var(--start-x); transform: rotate(0deg); }
            to { bottom: 110vh; left: var(--end-x); transform: rotate(20deg); opacity: 0; }
        }
    </style>
</head>
<body>

    <!-- ANA MENYU -->
    <div id="mainMenu" class="main-menu">
        <h1>Xoş gəldin 💙</h1>
        <button class="menu-btn" onclick="showSection('section1')">1. Mənimlə Barışarsan? 🥺</button>
        <button class="menu-btn" onclick="showSection('section2')">2. Məni Sevirsən? 💖</button>
    </div>

    <!-- BÖLMƏ 1: BARIŞMAQ -->
    <div id="section1" class="section hidden">
        <h2>Mənimlə barışarsan?</h2>
        <div style="display: flex; gap: 15px;">
            <button class="yes-btn" onclick="barisYes()">Bəli 💖</button>
            <button class="no-btn" id="noBtn" onmouseover="moveNo()">Xeyr 😡</button>
        </div>
        <p id="baris-result"></p>
        <button class="back-btn" onclick="goBack()">Geri</button>
    </div>

    <!-- BARIŞMAQ UĞURLU (KEDI VƏ MESAJ) -->
    <div id="barisSuccess" class="baris-success hidden">
        <div class="cat-image-container">
            <!-- Şəkil faylının adını bura yazırıq -->
            <img src="image_4.png" alt="Happy Cat">
        </div>
        <h2>Helelelelele! 🎉 Barışdıq!</h2>
        <button class="back-btn" onclick="goBack()">Geri</button>
    </div>

    <!-- BÖLMƏ 2: SEVGİ BARI -->
    <div id="section2" class="section hidden">
        <h2>Nə qədər sevirsən?</h2>
        <div class="progress-container">
            <div id="loveBar" class="progress-bar"></div>
        </div>
        <p id="percentText">0%</p>
        <button class="menu-btn" style="background: #ff758c; color: white;" onclick="fillBar()">Çox Sevirəm 😍</button>
        <p id="finalMsg"></p>
        <button class="back-btn" onclick="goBack()">Geri</button>
    </div>

    <script>
        function showSection(id) {
            document.querySelectorAll('.section, .main-menu, .baris-success').forEach(el => el.classList.add('hidden'));
            document.getElementById(id).classList.remove('hidden');
        }

        function goBack() {
            document.querySelectorAll('.section, .baris-success').forEach(el => el.classList.add('hidden'));
            document.getElementById('mainMenu').classList.remove('hidden');
            resetSections(); // Hər dəfə geri qayıdanda hər şeyi resetlə
        }

        // BARIŞMAQ FUNKSİYALARI
        function moveNo() {
            const btn = document.getElementById('noBtn');
            const x = Math.random() * (window.innerWidth - 100);
            const y = Math.random() * (window.innerHeight - 50);
            btn.style.position = 'fixed';
            btn.style.left = x + 'px';
            btn.style.top = y + 'px';
            document.getElementById('baris-result').innerText = "Yakalayamazsın ki! 😂";
        }

        function barisYes() {
            showSection('barisSuccess'); // Kedi pəncərəsinə keç
        }

        // SEVGİ BARI FUNKSİYALARI
        let currentWidth = 0;
        function fillBar() {
            if (currentWidth < 100) {
                currentWidth += 20;
                document.getElementById('loveBar').style.width = currentWidth + '%';
                document.getElementById('percentText').innerText = currentWidth + '%';
            }

            if (currentWidth >= 100) {
                document.getElementById('finalMsg').innerText = "VƏZİYYƏT KRİTİKDİR! SEVGİ PARTLAYIŞI! 🚀🚀🚀";
                for(let i=0; i<30; i++) {
                    setTimeout(createRocket, i * 100);
                }
            }
        }

        function createRocket() {
            const rocket = document.createElement('div');
            rocket.className = 'rocket';
            rocket.innerHTML = '🚀';
            rocket.style.setProperty('--start-x', Math.random() * 100 + 'vw');
            rocket.style.setProperty('--end-x', Math.random() * 100 + 'vw');
            rocket.style.left = rocket.style.getPropertyValue('--start-x');
            document.body.appendChild(rocket);
            setTimeout(() => rocket.remove(), 2000);
        }

        // RESET FUNKSİYASI
        function resetSections() {
            // Barışma hissəsini resetlə
            const noBtn = document.getElementById('noBtn');
            noBtn.style.position = 'relative';
            noBtn.style.left = '0';
            noBtn.style.top = '0';
            document.getElementById('baris-result').innerText = "";
            document.getElementById('barisSuccess').classList.add('hidden');

            // Sevgi barını resetlə
            currentWidth = 0;
            document.getElementById('loveBar').style.width = '0%';
            document.getElementById('percentText').innerText = '0%';
            document.getElementById('finalMsg').innerText = "";
        }
    </script>
</body>
</html>
