<!DOCTYPE html>
<html lang="az">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aygül üçün Özəl 💙</title>
    <style>
        body {
            margin: 0;
            font-family: 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, #1e3c72, #2a5298);
            color: white;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
            text-align: center;
        }

        .main-menu, .section {
            background: rgba(255, 255, 255, 0.1);
            padding: 30px;
            border-radius: 20px;
            backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
            width: 350px;
        }

        .hidden { display: none; }

        button {
            width: 100%;
            padding: 15px;
            margin: 10px 0;
            border: none;
            border-radius: 10px;
            font-size: 18px;
            cursor: pointer;
            transition: 0.3s;
            font-weight: bold;
        }

        .menu-btn { background: #ffcc00; color: #333; }
        .yes-btn { background: #00ffae; color: #1e3c72; }
        .no-btn { background: #ff4d4d; color: white; }
        .back-btn { background: #ccc; color: #333; font-size: 14px; width: auto; padding: 5px 15px; }

        /* Sevgi Barı */
        .progress-container {
            width: 100%;
            background: #eee;
            border-radius: 13px;
            margin: 20px 0;
            height: 25px;
            overflow: hidden;
        }

        .progress-bar {
            width: 0%;
            height: 100%;
            background: linear-gradient(90deg, #ff758c, #ff4d4d);
            transition: width 0.5s ease;
        }

        #cat-img { width: 100%; border-radius: 10px; margin-top: 15px; display: none; }
        
        /* Raket/Füze effekti */
        .rocket {
            position: absolute;
            font-size: 40px;
            animation: rocketFly 2s linear forwards;
        }

        @keyframes rocketFly {
            from { bottom: -50px; left: var(--start-x); transform: rotate(0deg); }
            to { bottom: 110vh; left: var(--end-x); transform: rotate(20deg); }
        }
    </style>
</head>
<body>

    <!-- ANA MENYU -->
    <div id="mainMenu" class="main-menu">
        <h1>Xoş gəldin 💙</h1>
        <button class="menu-btn" onclick="showSection('section1')">1. Mənimlə Barışarsan? 🥺</button>
        <button class="menu-btn" onclick="showSection('section2')">2. Məni Sevirsən? 💖</button>
    </div>

    <!-- BÖLMƏ 1: BARIŞMAQ -->
    <div id="section1" class="section hidden">
        <h2>Mənimlə barışarsan?</h2>
        <div style="display: flex; gap: 10px;">
            <button class="yes-btn" onclick="barisYes()">Bəli 💖</button>
            <button class="no-btn" onclick="barisNo()">Xeyr 😡</button>
        </div>
        <img id="cat-img" src="https://media.tenor.com/J97_7_v9_pYAAAAM/cat-dance.gif" alt="Happy Cat">
        <p id="baris-result"></p>
        <button class="back-btn" onclick="goBack()">Geri</button>
    </div>

    <!-- BÖLMƏ 2: SEVGİ BARI -->
    <div id="section2" class="section hidden">
        <h2>Nə qədər sevirsən?</h2>
        <div class="progress-container">
            <div id="loveBar" class="progress-bar"></div>
        </div>
        <p id="percentText">0%</p>
        <button class="yes-btn" onclick="fillBar()">Çox Sevirəm 😍</button>
        <p id="finalMsg"></p>
        <button class="back-btn" onclick="goBack()">Geri</button>
    </div>

    <script>
        function showSection(id) {
            document.getElementById('mainMenu').classList.add('hidden');
            document.getElementById(id).classList.remove('hidden');
        }

        function goBack() {
            document.querySelectorAll('.section').forEach(s => s.classList.add('hidden'));
            document.getElementById('mainMenu').classList.remove('hidden');
            // Resetləmək istəsən bura kod əlavə edə bilərik
        }

        // BARIŞMAQ FUNKSİYALARI
        function barisYes() {
            document.getElementById('cat-img').style.display = 'block';
            document.getElementById('baris-result').innerHTML = "Helelelelele! 🎉 Barışdıq!";
        }

        function barisNo() {
            alert("Olmur! Bu seçim deaktivdir 😄");
        }

        // SEVGİ BARI FUNKSİYALARI
        let currentWidth = 0;
        function fillBar() {
            if (currentWidth < 100) {
                currentWidth += 20;
                document.getElementById('loveBar').style.width = currentWidth + '%';
                document.getElementById('percentText').innerText = currentWidth + '%';
            }

            if (currentWidth >= 100) {
                document.getElementById('finalMsg').innerText = "VƏZİYYƏT KRİTİKDİR! SEVGİ PARTLAYIŞI! 🚀🚀🚀";
                launchRockets();
            }
        }

        function launchRockets() {
            for (let i = 0; i < 20; i++) {
                setTimeout(() => {
                    const rocket = document.createElement('div');
                    rocket.className = 'rocket';
                    rocket.innerHTML = '🚀';
                    rocket.style.setProperty('--start-x', Math.random() * 100 + 'vw');
                    rocket.style.setProperty('--end-x', Math.random() * 100 + 'vw');
                    rocket.style.left = rocket.style.getPropertyValue('--start-x');
                    document.body.appendChild(rocket);
                    setTimeout(() => rocket.remove(), 2000);
                }, i * 150);
            }
        }
    </script>
</body>
</html>
