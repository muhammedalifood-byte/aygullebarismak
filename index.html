<!DOCTYPE html>
<html lang="az">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aygül üçün 💙</title>
    <style>
        body {
            margin: 0;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(45deg, #1e3c72, #2a5298, #7b1fa2, #ff758c);
            background-size: 400% 400%;
            animation: gradientBG 15s ease infinite;
            overflow: hidden;
            color: white;
        }

        @keyframes gradientBG {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        /* Şəkildəki kimi şüşə effektli pəncərə */
        .glass-card {
            background: rgba(255, 255, 255, 0.1);
            padding: 40px;
            border-radius: 30px;
            backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            box-shadow: 0 15px 35px rgba(0,0,0,0.4);
            text-align: center;
            width: 380px;
            z-index: 10;
        }

        h1 { font-size: 2.2em; margin-bottom: 20px; }
        .hidden { display: none; }

        .btn-main {
            width: 100%;
            padding: 15px;
            margin: 10px 0;
            border: none;
            border-radius: 15px;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s;
            background: #ffcc00;
            color: #333;
        }

        .btn-main:hover { transform: scale(1.05); background: #ffe066; }

        /* Alt bölmə düymələri */
        .action-btns { display: flex; gap: 15px; justify-content: center; margin-top: 20px; }
        .yes-btn { background: #00ffae; color: #1e3c72; padding: 12px 25px; border-radius: 50px; border: none; cursor: pointer; font-weight: bold; }
        .no-btn { background: #ff4d4d; color: white; padding: 12px 25px; border-radius: 50px; border: none; cursor: pointer; font-weight: bold; position: relative; }

        /* Sevgi Barı */
        .progress-container { width: 100%; background: rgba(255,255,255,0.2); border-radius: 20px; height: 25px; margin: 20px 0; overflow: hidden; }
        .progress-bar { width: 0%; height: 100%; background: #ff4d4d; transition: width 0.4s ease; }

        #cat-gif { width: 100%; border-radius: 15px; margin-top: 15px; display: none; }
        .back-link { display: block; margin-top: 20px; color: #ddd; font-size: 13px; cursor: pointer; text-decoration: underline; }

        .rocket { position: absolute; font-size: 40px; animation: flyUp 2s linear forwards; }
        @keyframes flyUp { 
            from { bottom: -50px; transform: rotate(0deg); } 
            to { bottom: 110vh; transform: rotate(20deg); opacity: 0; } 
        }
    </style>
</head>
<body>

    <!-- ANA SƏHİFƏ -->
    <div id="mainPage" class="glass-card">
        <h1>💙 Aygül 💙</h1>
        <button class="btn-main" onclick="openSection('barisPage')">1. Mənimlə barış 🥺</button>
        <button class="btn-main" onclick="openSection('sevgiPage')">2. Seviyonmu beni? 💖</button>
    </div>

    <!-- BARIŞMA BÖLMƏSİ -->
    <div id="barisPage" class="glass-card hidden">
        <h2>Barışaq? 👉👈</h2>
        <div class="action-btns">
            <button class="yes-btn" onclick="showCat()">Bəli 💖</button>
            <button class="no-btn" id="noBtn" onmouseover="moveNo()">Xeyr 😡</button>
        </div>
        <img id="cat-gif" src="https://media.tenor.com/J97_7_v9_pYAAAAM/cat-dance.gif">
        <p id="barisMsg"></p>
        <span class="back-link" onclick="goHome()">Geri qayıt</span>
    </div>

    <!-- SEVGİ BÖLMƏSİ -->
    <div id="sevgiPage" class="glass-card hidden">
        <h2>Nə qədər sevirsən?</h2>
        <div class="progress-container">
            <div id="loveBar" class="progress-bar"></div>
        </div>
        <p id="percentText">0%</p>
        <button class="btn-main" style="background: #ff758c; color: white;" onclick="fillLove()">Çox sevirəm! 😍</button>
        <p id="rocketMsg"></p>
        <span class="back-link" onclick="goHome()">Geri qayıt</span>
    </div>

    <script>
        function openSection(id) {
            document.getElementById('mainPage').classList.add('hidden');
            document.getElementById(id).classList.remove('hidden');
        }

        function goHome() {
            document.getElementById('barisPage').classList.add('hidden');
            document.getElementById('sevgiPage').classList.add('hidden');
            document.getElementById('mainPage').classList.remove('hidden');
        }

        // BARIŞMA MƏNTİQİ
        function moveNo() {
            const btn = document.getElementById('noBtn');
            const x = Math.random() * (window.innerWidth - 100);
            const y = Math.random() * (window.innerHeight - 50);
            btn.style.position = 'fixed';
            btn.style.left = x + 'px';
            btn.style.top = y + 'px';
            document.getElementById('barisMsg').innerText = "Olmur belə! 😂";
        }

        function showCat() {
            document.getElementById('noBtn').style.display = 'none';
            document.getElementById('cat-gif').style.display = 'block';
            document.getElementById('barisMsg').innerText = "Helelelelele! 🎉 Barışdıq!";
        }

        // SEVGI BAR MƏNTİQİ
        let loveLevel = 0;
        function fillLove() {
            if (loveLevel < 100) {
                loveLevel += 20;
                document.getElementById('loveBar').style.width = loveLevel + '%';
                document.getElementById('percentText').innerText = loveLevel + '%';
            }
            if (loveLevel >= 100) {
                document.getElementById('rocketMsg').innerText = "VƏZİYYƏT KRİTİKDİR! 🚀🚀🚀";
                for(let i=0; i<30; i++) {
                    setTimeout(createRocket, i * 100);
                }
            }
        }

        function createRocket() {
            const r = document.createElement('div');
            r.className = 'rocket';
            r.innerHTML = '🚀';
            r.style.left = Math.random() * 100 + 'vw';
            document.body.appendChild(r);
            setTimeout(() => r.remove(), 2000);
        }
    </script>
</body>
</html>
